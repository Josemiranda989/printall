services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: printall-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb_data
      - ./pocketbase/pb_migrations:/pb_migrations
      - ./pocketbase/pb_hooks:/pb_hooks
    environment:
      # Token de la Notion Internal Integration con acceso a la DB de Pedidos.
      # Lo lee el hook orders.pb.js para sincronizar pedidos a Notion.
      # Si falta, el sync queda deshabilitado silenciosamente (no rompe).
      NOTION_TOKEN: ${NOTION_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - printall

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Sentry necesita inyectarse en build time. Pasamos las mismas vars como
      # build args ademas de environment, porque @sentry/astro se carga como
      # integration durante `npm run build` (ver frontend/astro.config.mjs).
      args:
        SENTRY_DSN: ${SENTRY_DSN:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    container_name: printall-frontend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "4321:4321"
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-https://printall.jmlabs.app}
      PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER:-5493816563940}
      # Datos para mostrar el bloque "Datos para cobrar" en el detalle del pedido.
      # Si BNA_ALIAS está vacío, el bloque no se renderiza.
      BNA_ALIAS: ${BNA_ALIAS:-}
      BNA_HOLDER_NAME: ${BNA_HOLDER_NAME:-}
      # Sentry runtime: necesario para capturar errores server-side en SSR.
      # Sin SENTRY_DSN no se inicializa (no-op).
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      HOST: 0.0.0.0
      PORT: "4321"
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - printall

networks:
  printall:
    driver: bridge
