name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelar runs previos al pushear cambios nuevos a la misma branch — ahorra
# minutos de Actions y da feedback más rápido en PRs con múltiples pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tests + type check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Type check primero — falla rápido si hay errores de tipo, antes de
      # gastar tiempo corriendo los tests.
      - name: Type check (astro check)
        run: npx astro check

      - name: Tests (vitest)
        run: npm test
